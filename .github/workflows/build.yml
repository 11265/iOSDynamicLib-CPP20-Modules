name: Build iOS Dynamic Library (C++20 Modules)

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

env:
  LIBRARY_NAME: iOSDynamicLib
  LIBRARY_VERSION: 1.0.0

jobs:
  build-ios:
    name: Build iOS Framework with C++20 Modules
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Ninja
        run: brew install ninja

      - name: Show versions
        run: |
          xcodebuild -version
          clang --version
          cmake --version
          ninja --version

      - name: Build for iOS (arm64)
        run: |
          cmake -B build/ios \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_BUILD_TYPE=${{ github.event.inputs.configuration || 'Release' }} \
            -DCMAKE_CXX_SCAN_FOR_MODULES=ON \
            -DCMAKE_CXX_COMPILER=clang++ \
            -GNinja
          
          cmake --build build/ios -j$(sysctl -n hw.ncpu)

      - name: Build for iOS Simulator (x86_64)
        run: |
          cmake -B build/ios-simulator-x86 \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_BUILD_TYPE=${{ github.event.inputs.configuration || 'Release' }} \
            -DCMAKE_CXX_SCAN_FOR_MODULES=ON \
            -DCMAKE_CXX_COMPILER=clang++ \
            -GNinja
          
          cmake --build build/ios-simulator-x86 -j$(sysctl -n hw.ncpu)

      - name: Build for iOS Simulator (arm64)
        run: |
          cmake -B build/ios-simulator-arm64 \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_BUILD_TYPE=${{ github.event.inputs.configuration || 'Release' }} \
            -DCMAKE_CXX_SCAN_FOR_MODULES=ON \
            -DCMAKE_CXX_COMPILER=clang++ \
            -GNinja
          
          cmake --build build/ios-simulator-arm64 -j$(sysctl -n hw.ncpu)

      - name: Create XCFramework
        run: |
          mkdir -p output
          
          echo "Creating XCFramework..."
          
          xcodebuild -create-xcframework \
            -library "build/ios/lib${{ env.LIBRARY_NAME }}.a" \
            -library "build/ios-simulator-x86/lib${{ env.LIBRARY_NAME }}.a" \
            -library "build/ios-simulator-arm64/lib${{ env.LIBRARY_NAME }}.a" \
            -output "output/${{ env.LIBRARY_NAME }}.xcframework" || true
          
          if [ ! -d "output/${{ env.LIBRARY_NAME }}.xcframework" ]; then
            echo "Creating fat binary for simulator..."
            mkdir -p output/ios-simulator
            
            lipo -create \
              "build/ios-simulator-x86/lib${{ env.LIBRARY_NAME }}.a" \
              "build/ios-simulator-arm64/lib${{ env.LIBRARY_NAME }}.a" \
              -output "output/ios-simulator/lib${{ env.LIBRARY_NAME }}.a"
            
            xcodebuild -create-xcframework \
              -library "build/ios/lib${{ env.LIBRARY_NAME }}.a" \
              -library "output/ios-simulator/lib${{ env.LIBRARY_NAME }}.a" \
              -output "output/${{ env.LIBRARY_NAME }}.xcframework"
          fi

      - name: Verify XCFramework
        run: |
          echo "XCFramework contents:"
          ls -la output/
          echo ""
          echo "Binary info:"
          find output -name "*.a" -exec file {} \; || true
          find output -name "*.dylib" -exec file {} \; || true

      - name: Create ZIP archive
        run: |
          cd output
          zip -r ${{ env.LIBRARY_NAME }}-${{ env.LIBRARY_VERSION }}-cpp20-modules.xcframework.zip ${{ env.LIBRARY_NAME }}.xcframework

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.LIBRARY_NAME }}-xcframework-cpp20
          path: output/${{ env.LIBRARY_NAME }}.xcframework
          retention-days: 30

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.LIBRARY_NAME }}-xcframework-zip
          path: output/${{ env.LIBRARY_NAME }}-${{ env.LIBRARY_VERSION }}-cpp20-modules.xcframework.zip
          retention-days: 90

  release:
    name: Create Release
    needs: build-ios
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: iOSDynamicLib-xcframework-zip
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
