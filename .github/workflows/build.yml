name: Build iOS Dynamic Library (C++20 Modules)

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

env:
  LIBRARY_NAME: iOSDynamicLib
  LIBRARY_VERSION: 1.0.0

jobs:
  build-ios:
    name: Build iOS Framework with Xcode
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show versions
        run: |
          xcodebuild -version
          clang --version

      - name: Build with Xcode/Clang
        run: |
          chmod +x build.sh
          ./build.sh ${{ github.event.inputs.configuration || 'Release' }}

      - name: Verify XCFramework
        run: |
          echo "XCFramework contents:"
          ls -la build/
          echo ""
          echo "Binary info:"
          find build -name "*.a" -exec file {} \; || true

      - name: Create ZIP archive
        run: |
          cd build
          zip -r ${{ env.LIBRARY_NAME }}-${{ env.LIBRARY_VERSION }}.xcframework.zip ${{ env.LIBRARY_NAME }}.xcframework

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.LIBRARY_NAME }}-xcframework
          path: build/${{ env.LIBRARY_NAME }}.xcframework
          retention-days: 30

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.LIBRARY_NAME }}-xcframework-zip
          path: build/${{ env.LIBRARY_NAME }}-${{ env.LIBRARY_VERSION }}.xcframework.zip
          retention-days: 90

  release:
    name: Create Release
    needs: build-ios
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: iOSDynamicLib-xcframework-zip
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
